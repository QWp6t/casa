version: 2
updates:
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 0 * * *"
      timezone: "UTC"
    groups:
      flake-inputs:
        patterns:
          - "*"
        exclude-patterns:
          - "llm-agents"
    commit-message:
      prefix: "flake"
