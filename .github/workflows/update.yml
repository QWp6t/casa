name: update-flake-lock

on:
  workflow_dispatch: # manual trigger from the Actions tab
  schedule:
    - cron: "0 0 * * *" # every day at 00:00 UTC

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: update-flake-lock
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      HAS_UPDATE_PAT: ${{ secrets.GH_TOKEN_FOR_UPDATES != '' }}
    steps:
      - name: Skip when PAT is missing
        if: ${{ env.HAS_UPDATE_PAT != 'true' }}
        run: echo "GH_TOKEN_FOR_UPDATES is not configured; skipping update-flake-lock."

      - if: ${{ env.HAS_UPDATE_PAT == 'true' }}
        uses: actions/checkout@v6

      - if: ${{ env.HAS_UPDATE_PAT == 'true' }}
        uses: DeterminateSystems/nix-installer-action@main

      - id: update-with-pat
        if: ${{ env.HAS_UPDATE_PAT == 'true' }}
        uses: DeterminateSystems/update-flake-lock@main
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          pr-title: "flake: bump inputs"

      - name: Wait for PR checks and auto-merge
        if: ${{ env.HAS_UPDATE_PAT == 'true' && steps.update-with-pat.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          PR: ${{ steps.update-with-pat.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          echo "waiting for checks on PR #$PR..."
          sha="$(gh pr view "$PR" --json headRefOid --jq '.headRefOid')"
          checks_ready=false
          for _ in $(seq 1 18); do
            count="$(gh api "repos/$GITHUB_REPOSITORY/commits/$sha/check-runs" --jq '.total_count' 2>/dev/null || echo 0)"
            if [ "${count:-0}" -gt 0 ]; then
              checks_ready=true
              break
            fi
            sleep 10
          done

          if [ "$checks_ready" != true ]; then
            echo "no checks were reported for PR #$PR after 3 minutes — leaving PR open for review"
            exit 0
          fi

          if gh pr checks "$PR" --watch --fail-fast; then
            echo "all checks passed — squash-merging"
            gh pr merge "$PR" --squash --delete-branch
          else
            echo "checks failed — leaving PR open for review"
          fi
